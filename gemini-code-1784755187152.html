<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Ping Pong Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Animated colorful background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            margin-bottom: 8px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            font-size: 2.2rem;
        }

        .controls {
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: center;
        }

        .button-group {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px;
            border-radius: 25px;
        }

        .score-input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 55px;
            padding: 5px;
            border-radius: 12px;
            border: none;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            outline: none;
        }

        button {
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.7);
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            background-color: #ffffff;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }

        button.active {
            background-color: #ffe600;
            color: #000;
        }

        .canvas-container {
            position: relative;
        }

        canvas {
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background-color: rgba(0, 0, 0, 0.4);
            display: block;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .game-over-overlay h2 {
            font-size: 2.5rem;
            color: #ffe600;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 230, 0, 0.5);
        }

        .game-over-overlay p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .instructions {
            margin-top: 12px;
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>🏓 Colorful Ping Pong</h1>

    <div class="controls">
        <div class="button-group">
            <button id="vsRobotBtn" class="active" onclick="setMode('robot')">VS Robot</button>
            <button id="vs2PlayerBtn" onclick="setMode('2player')">2 Players</button>
        </div>

        <div class="button-group">
            <button id="easyBtn" class="active" onclick="setDifficulty('easy')">Easy</button>
            <button id="mediumBtn" onclick="setDifficulty('medium')">Medium</button>
            <button id="hardBtn" onclick="setDifficulty('hard')">Hard</button>
        </div>

        <div class="score-input-container">
            <label for="maxScoreInput">Points to Win:</label>
            <input type="number" id="maxScoreInput" value="5" min="1" max="99" onchange="updateMaxScore(this.value)">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="pong" width="800" height="500"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
            <h2 id="winnerText">Player 1 Wins!</h2>
            <p>Game Over</p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <div class="instructions" id="instructionsText">
        Player 1 (Left): <b>W</b> / <b>S</b> | Player 2 (Right): <b>Robot AI</b>
    </div>

    <script>
        const canvas = document.getElementById("pong");
        const ctx = canvas.getContext("2d");

        let gameMode = 'robot'; 
        let difficulty = 'easy'; 
        let targetScore = 5;
        let isGameOver = false;

        // Constants
        const PADDLE_WIDTH = 12;
        const BALL_RADIUS = 10;
        const FIXED_BALL_SPEED = 7; // STRICT CONSTANT BALL SPEED

        // Dynamic difficulty variables
        let paddleHeight = 110;
        let aiReactionSpeed = 0.05;

        // Game Objects
        const player1 = {
            x: 10,
            y: canvas.height / 2 - 55,
            width: PADDLE_WIDTH,
            height: paddleHeight,
            color: "#FFD700", // Bright Gold
            score: 0
        };

        const player2 = {
            x: canvas.width - 10 - PADDLE_WIDTH,
            y: canvas.height / 2 - 55,
            width: PADDLE_WIDTH,
            height: paddleHeight,
            color: "#00FFFF", // Bright Cyan
            score: 0
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: BALL_RADIUS,
            color: "#FF3399", // Neon Pink
            vx: FIXED_BALL_SPEED,
            vy: 2
        };

        const keys = {};

        window.addEventListener("keydown", (e) => { keys[e.key] = true; });
        window.addEventListener("keyup", (e) => { keys[e.key] = false; });

        function updateMaxScore(value) {
            let val = parseInt(value);
            if (isNaN(val) || val < 1) val = 1;
            targetScore = val;
            document.getElementById("maxScoreInput").value = val;
            resetGame();
        }

        function setMode(mode) {
            gameMode = mode;
            document.getElementById("vsRobotBtn").classList.toggle("active", mode === 'robot');
            document.getElementById("vs2PlayerBtn").classList.toggle("active", mode === '2player');
            
            updateInstructions();
            resetGame();
        }

        function setDifficulty(diff) {
            difficulty = diff;
            document.getElementById("easyBtn").classList.toggle("active", diff === 'easy');
            document.getElementById("mediumBtn").classList.toggle("active", diff === 'medium');
            document.getElementById("hardBtn").classList.toggle("active", diff === 'hard');

            if (diff === 'easy') {
                paddleHeight = 110;
                aiReactionSpeed = 0.05;
            } else if (diff === 'medium') {
                paddleHeight = 85;
                aiReactionSpeed = 0.08;
            } else if (diff === 'hard') {
                paddleHeight = 65;
                aiReactionSpeed = 0.13;
            }

            player1.height = paddleHeight;
            player2.height = paddleHeight;
            resetGame();
        }

        function updateInstructions() {
            const instr = document.getElementById("instructionsText");
            if (gameMode === 'robot') {
                instr.innerHTML = "Player 1 (Left): <b>W</b> / <b>S</b> | Player 2 (Right): <b>Robot AI</b>";
            } else {
                instr.innerHTML = "Player 1 (Left): <b>W</b> / <b>S</b> | Player 2 (Right): <b>Up Arrow</b> / <b>Down Arrow</b>";
            }
        }

        function resetGame() {
            player1.score = 0;
            player2.score = 0;
            isGameOver = false;
            document.getElementById("gameOverOverlay").style.display = "none";
            resetBall(1);
        }

        function resetBall(direction = 1) {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            
            const angle = (Math.random() * 0.8 - 0.4);
            ball.vx = direction * FIXED_BALL_SPEED * Math.cos(angle);
            ball.vy = FIXED_BALL_SPEED * Math.sin(angle);

            normalizeBallSpeed();
        }

        function normalizeBallSpeed() {
            const currentSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            if (currentSpeed !== 0) {
                ball.vx = (ball.vx / currentSpeed) * FIXED_BALL_SPEED;
                ball.vy = (ball.vy / currentSpeed) * FIXED_BALL_SPEED;
            }
        }

        function update() {
            if (isGameOver) return;

            // Player 1 Control (W / S)
            if (keys['w'] || keys['W']) player1.y -= 7;
            if (keys['s'] || keys['S']) player1.y += 7;

            // Player 2 Control (Robot or Human)
            if (gameMode === '2player') {
                if (keys['ArrowUp']) player2.y -= 7;
                if (keys['ArrowDown']) player2.y += 7;
            } else {
                const targetY = ball.y - player2.height / 2;
                player2.y += (targetY - player2.y) * aiReactionSpeed; 
            }

            // Keep paddles inside canvas
            player1.y = Math.max(0, Math.min(canvas.height - player1.height, player1.y));
            player2.y = Math.max(0, Math.min(canvas.height - player2.height, player2.y));

            // Move ball
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Top and Bottom Wall Collisions
            if (ball.y - ball.radius < 0) {
                ball.y = ball.radius;
                ball.vy *= -1;
            } else if (ball.y + ball.radius > canvas.height) {
                ball.y = canvas.height - ball.radius;
                ball.vy *= -1;
            }

            // Paddle Collisions
            let paddle = (ball.x < canvas.width / 2) ? player1 : player2;

            if (checkCollision(ball, paddle)) {
                let collidePoint = (ball.y - (paddle.y + paddle.height / 2)) / (paddle.height / 2);
                let bounceAngle = collidePoint * (Math.PI / 4);
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.vx = direction * FIXED_BALL_SPEED * Math.cos(bounceAngle);
                ball.vy = FIXED_BALL_SPEED * Math.sin(bounceAngle);

                normalizeBallSpeed();
            }

            // Score conditions
            if (ball.x - ball.radius < 0) {
                player2.score++;
                checkWinCondition();
                if (!isGameOver) resetBall(1);
            } else if (ball.x + ball.radius > canvas.width) {
                player1.score++;
                checkWinCondition();
                if (!isGameOver) resetBall(-1);
            }
        }

        function checkWinCondition() {
            if (player1.score >= targetScore || player2.score >= targetScore) {
                isGameOver = true;
                const overlay = document.getElementById("gameOverOverlay");
                const winnerText = document.getElementById("winnerText");

                if (player1.score >= targetScore) {
                    winnerText.innerText = "🏆 Player 1 Wins!";
                } else {
                    winnerText.innerText = gameMode === 'robot' ? "🤖 Robot Wins!" : "🏆 Player 2 Wins!";
                }

                overlay.style.display = "flex";
            }
        }

        function checkCollision(b, p) {
            return b.x - b.radius < p.x + p.width &&
                   b.x + b.radius > p.x &&
                   b.y + b.radius > p.y &&
                   b.y - b.radius < p.y + p.height;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Center dotted net
            ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
            ctx.lineWidth = 3;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Scores
            ctx.fillStyle = "#FFF";
            ctx.font = "bold 40px sans-serif";
            ctx.fillText(player1.score, canvas.width / 4, 60);
            ctx.fillText(player2.score, (3 * canvas.width) / 4, 60);

            // Paddles
            ctx.fillStyle = player1.color;
            ctx.fillRect(player1.x, player1.y, player1.width, player1.height);

            ctx.fillStyle = player2.color;
            ctx.fillRect(player2.x, player2.y, player2.width, player2.height);

            // Ball
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
